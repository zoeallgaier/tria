<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tria</title>
  <meta name="description" content="Social Media is so back. A quiet place for small circles of friends." />

  <meta name="theme-color" content="#edeef0" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0e1012" media="(prefers-color-scheme: dark)" />

  <!-- Installable web app (bookmark / add-to-home-screen). -->
  <link rel="manifest" href="site.webmanifest" />
  <link rel="icon" href="icons/icon-32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="icons/icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Tria" />
  <!-- Transparent status bar in the installed (homescreen) app: the web view
       runs edge-to-edge UNDER the status bar (liquid-glass), rather than iOS
       reserving an opaque strip. Content clears the notch via the
       env(safe-area-inset-top) padding on .topbar / main. At the top the frosted
       topbar (wordmark + Post) sits under it; scroll down and the topbar tucks
       away, leaving the status area fully clear. -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Oxygen:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- The ?v= stamp busts HTTP caches on deploy AND drives the self-updater in
       app.js (it refetches this file and reloads when the stamp changes).
       BUMP THE SAME NUMBER ON EVERY LINE whenever any css/js file changes. -->
  <link rel="stylesheet" href="css/tokens.css?v=69" />
  <link rel="stylesheet" href="css/app.css?v=69" />
</head>

<body>
  <!-- Boot splash: static HTML so it paints before any JS or network work.
       The serif t wears the Post button's drifting pastel gradient; app.js
       fades it out once the first view is in (see dismissSplash). -->
  <div class="splash" id="splash" aria-hidden="true">
    <span class="splash-t">t</span>
  </div>

  <a href="#main" class="skip-link">Skip to main content</a>

  <!-- Off-screen gradient def: lets an SVG stroke carry the same quartet
       gradient as the "going ✓" text — the four type colours, matching the
       liked heart's palette (stops are themed in css/app.css, so they flip with
       light/dark). Zero-size, purely a paint source. -->
  <svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute">
    <defs>
      <linearGradient id="going-grad" x1="0" y1="0" x2="1" y2="1">
        <stop class="going-grad-a" offset="0" />
        <stop class="going-grad-b" offset="0.34" />
        <stop class="going-grad-c" offset="0.67" />
        <stop class="going-grad-d" offset="1" />
      </linearGradient>
    </defs>
  </svg>

  <!-- Ambient wash: a soft radial glow behind everything, giving the page
       background depth. Its colour is on-brand by default, and tinted from a
       profile's photo when you're viewing one (see applyAmbient in app.js). -->
  <div class="ambient" aria-hidden="true"></div>

  <!-- Brand bar: fixed top on every breakpoint. -->
  <header class="topbar">
    <a class="brand" href="#/about" aria-label="Tria, about">
      <span class="brand-mark">tria</span>
    </a>
    <!-- Mobile-only header action; the sidebar carries Publish on desktop.
         Lives in the topbar (not the blurred bottom nav) so it sits top-right. -->
    <a class="topbar-publish publish-fill" href="#/publish" aria-label="Post">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 5v14" /><path d="M5 12h14" />
      </svg>
      <span>Post</span>
    </a>
  </header>

  <!-- Nav lives OUTSIDE the (backdrop-filtered) topbar so its mobile
       fixed-to-bottom positioning anchors to the viewport, not the bar.
       Desktop: top-right of the bar. Mobile: bottom tab bar. Filled by app.js. -->
  <nav class="nav" id="nav" aria-label="Primary"></nav>

  <main id="main" tabindex="-1">
    <!-- Views are rendered here by the router in app.js. -->
    <div id="view"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=69"></script>
  <script src="js/store.js?v=69"></script>
  <script src="js/app.js?v=69"></script>
</body>

</html>
